name: release-macos

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  noop:
    if: ${{ github.event_name == 'push' && !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip release on non-tag push
        run: echo "release-macos only packages tagged releases"

  release:
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') }}
    runs-on: macos-14
    permissions:
      contents: write
    env:
      RELEASE_SIGN: ${{ vars.RELEASE_SIGN || '0' }}
      RELEASE_NOTARIZE: ${{ vars.RELEASE_NOTARIZE || '0' }}
      RELEASE_INCLUDE_DMG: ${{ vars.RELEASE_INCLUDE_DMG || '0' }}
      APPLE_SIGN_IDENTITY: ${{ secrets.APPLE_SIGN_IDENTITY }}
      APPLE_KEYCHAIN_PROFILE: ${{ secrets.APPLE_KEYCHAIN_PROFILE }}
      APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
      APPLE_API_KEY_PATH: ${{ runner.temp }}/AuthKey.p8
      APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
      APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061
        with:
          version: 10.28.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare App Store Connect key
        if: ${{ env.RELEASE_NOTARIZE == '1' && env.APPLE_KEYCHAIN_PROFILE == '' && env.APPLE_API_KEY_P8_BASE64 != '' }}
        run: |
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$APPLE_API_KEY_PATH"

      - name: Release preflight
        run: pnpm release:mac:preflight

      - name: Typecheck
        run: pnpm typecheck

      - name: Tests
        run: pnpm test

      - name: Desktop smoke
        run: pnpm test:e2e:smoke

      - name: Build arm64 artifacts
        run: pnpm release:mac:make:arm64

      - name: Build x64 artifacts
        run: pnpm release:mac:make:x64

      - name: Generate release evidence
        env:
          RELEASE_TESTS_PASSED: "1"
          RELEASE_TYPECHECK_PASSED: "1"
          RELEASE_E2E_PASSED: "1"
        run: |
          pnpm release:mac:manifest
          pnpm release:mac:evidence

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f
        with:
          name: release-evidence
          path: |
            out/make/**
            out/release/**

      - name: Enforce go/no-go
        run: |
          node -e "const fs=require('fs');const report=JSON.parse(fs.readFileSync('out/release/go-no-go.json','utf8'));if(report.decision!=='go'){console.error('Go/No-Go failed', report);process.exit(1)}"
